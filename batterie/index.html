<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASZ Batterie-Sortierer</title>
  
  <meta name="theme-color" content="#8bc34a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" id="favicon" type="image/svg+xml" href="">

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
    body { background: #121212; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 15px; min-height: 100vh; }
    
    header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    header svg { width: 32px; height: 32px; }
    h1 { color: #8bc34a; font-size: 1.3rem; }
    p.sub { font-size: 0.8rem; color: #aaa; margin-bottom: 12px; text-align: center; }
    
    .cam-box { position: relative; width: 100%; max-width: 440px; aspect-ratio: 4/3; background: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    video { width: 100%; height: 100%; object-fit: cover; }
    
    .options-box { width: 100%; max-width: 440px; margin-top: 12px; background: #1e1e1e; padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
    .options-box label { font-size: 0.85rem; color: #ff9800; font-weight: bold; cursor: pointer; }

    /* Button-Styling für Toggle */
    .btn-action { width: 100%; max-width: 440px; margin-top: 12px; padding: 14px; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-scan-mode { background: #8bc34a; color: #000; }
    .btn-reset-mode { background: #2196f3; color: #fff; }
    .btn-action:disabled { background: #333; color: #666; cursor: not-allowed; }

    /* Ergebnis-Karte mit Behälter-Illustration */
    .card { width: 100%; max-width: 440px; margin-top: 14px; padding: 16px; border-radius: 12px; background: #1e1e1e; border: 2px solid #444; display: none; }
    .card.active { display: block; }
    
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .art-nr { font-size: 0.75rem; font-weight: bold; padding: 4px 8px; border-radius: 4px; background: rgba(255,255,255,0.15); }
    
    .container-visual { width: 100%; background: #121212; border-radius: 8px; padding: 12px; display: flex; align-items: center; gap: 15px; margin: 10px 0; border: 1px dashed #444; }
    .container-visual svg { width: 64px; height: 64px; flex-shrink: 0; }
    .container-text { font-size: 0.9rem; font-weight: bold; }

    .title { font-size: 1.2rem; font-weight: bold; margin-bottom: 4px; }
    .info { font-size: 0.85rem; line-height: 1.4; color: #ddd; margin-top: 6px; }
    .warn { font-size: 0.8rem; margin-top: 10px; padding: 8px; background: rgba(255,0,0,0.15); border-radius: 6px; color: #ff8a80; border: 1px solid rgba(255,0,0,0.3); }

    /* Farbschemen je nach ASZ-Behälter */
    .geraete { border-color: #4caf50; } .geraete .title { color: #81c784; }
    .li-ok { border-color: #2196f3; } .li-ok .title { color: #64b5f6; }
    .li-dmg { border-color: #f44336; } .li-dmg .title { color: #e57373; }
    .starter { border-color: #ff9800; } .starter .title { color: #ffb74d; }
    
    #loading { position: absolute; inset: 0; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; font-size: 0.9rem; color: #aaa; }
  </style>
</head>
<body>

  <header>
    <svg id="app-icon-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" rx="22" fill="#1e1e1e"/>
      <rect x="25" y="30" width="50" height="50" rx="8" fill="none" stroke="#8bc34a" stroke-width="6"/>
      <rect x="42" y="22" width="16" height="8" rx="2" fill="#8bc34a"/>
      <path d="M 38 55 L 52 38 L 48 53 L 62 45 L 48 62 L 52 48 Z" fill="#ffc107"/>
    </svg>
    <h1>ASZ Batterie-Sortierer</h1>
  </header>

  <p class="sub">Vorsortierung nach O.Ö. LAVU Richtlinien</p>

  <div class="cam-box">
    <video id="webcam" autoplay playsinline muted></video>
    <div id="loading">Lade KI-Modell...</div>
  </div>

  <div class="options-box" id="options-box">
    <label for="damaged-chk">⚠️ Batterie beschädigt / aufgebläht?</label>
    <input type="checkbox" id="damaged-chk" style="width: 20px; height: 20px;">
  </div>

  <!-- Action Button (Toggelt zwischen Scan & Neuer Scan) -->
  <button class="btn-action btn-scan-mode" id="action-btn" disabled>
    <span id="btn-icon">📷</span>
    <span id="btn-text">Scan ausführen</span>
  </button>

  <!-- Ergebnis-Karte -->
  <div id="result" class="card">
    <div class="card-header">
      <div id="target-title" class="title"></div>
      <span id="art-nr" class="art-nr"></span>
    </div>

    <!-- Visuelle Behälter-Anzeige -->
    <div class="container-visual">
      <div id="container-svg-slot"></div>
      <div class="container-text" id="container-desc"></div>
    </div>

    <div id="target-info" class="info"></div>
    <div id="target-warn" class="warn"></div>
  </div>

  <script>
    // Favicon & SW Setup
    const svgElement = document.getElementById('app-icon-svg');
    const svgString = new XMLSerializer().serializeToString(svgElement);
    const svgBlob = new Blob([svgString], { type: 'image/svg+xml' });
    document.getElementById('favicon').href = URL.createObjectURL(svgBlob);

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(err => console.log('SW:', err));
    }

    // SVG-Grafiken für die Behältertypen
    const containerIcons = {
      box_green: `<svg viewBox="0 0 100 100"><rect x="10" y="35" width="80" height="50" rx="6" fill="#4caf50"/><path d="M 5 30 L 95 30 L 90 20 L 10 20 Z" fill="#388e3c"/><text x="50" y="65" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">BOX</text></svg>`,
      box_blue: `<svg viewBox="0 0 100 100"><rect x="10" y="35" width="80" height="50" rx="6" fill="#2196f3"/><path d="M 5 30 L 95 30 L 90 20 L 10 20 Z" fill="#1976d2"/><text x="50" y="65" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">Li-OK</text></svg>`,
      box_red: `<svg viewBox="0 0 100 100"><rect x="10" y="35" width="80" height="50" rx="6" fill="#f44336"/><path d="M 5 30 L 95 30 L 90 20 L 10 20 Z" fill="#d32f2f"/><text x="50" y="60" font-size="11" fill="#fff" font-weight="bold" text-anchor="middle">GEFAHR</text></svg>`,
      tub_yellow: `<svg viewBox="0 0 100 100"><path d="M 10 30 L 90 30 L 80 80 L 20 80 Z" fill="#ff9800"/><rect x="5" y="22" width="90" height="10" rx="3" fill="#f57c00"/><text x="50" y="60" font-size="11" fill="#fff" font-weight="bold" text-anchor="middle">WANNE</text></svg>`
    };

    // ASZ Zuordnungen mit Behälter-Visualisierung
    const aszRules = {
      geraete: {
        title: "Gerätebatterien",
        art: "Art.Nr. 4110",
        css: "geraete",
        icon: containerIcons.box_green,
        containerName: "Grüne Sammelbox für Haushaltsbatterien",
        info: "• Konsumbatterien (Alkali, Zink-Kohle)<br>• NiCd / NiMH Werkzeugakkus<br>• Knopfzellen & Weidezaunbatterien",
        warn: "💡 Hinweis: Kontaktfläche/Pole bei Knopfzellen abkleben."
      },
      li_unbeschaedigt: {
        title: "Lithium unbeschädigt",
        art: "Art.Nr. 4112",
        css: "li-ok",
        icon: containerIcons.box_blue,
        containerName: "Blaue Spezialbox (Lithium < 5 kg)",
        info: "• Intakte Li-Ion Akkus bis 5 kg<br>• Entnehmbare Akkus aus Handys, Laptops, Werkzeugen & Gartengeräten",
        warn: "🔒 Sicherheit: Pole und freistehende Drähte zwingend abkleben!"
      },
      li_beschaedigt: {
        title: "Lithium beschädigt",
        art: "Art.Nr. 4111",
        css: "li-dmg",
        icon: containerIcons.box_red,
        containerName: "Rote Brandschutzbox / Beutel",
        info: "• Verformte, erhitzte oder beschädigte LiPo/Li-Ion Akkus<br>• Akkus aus E-Bikes / E-Scootern bis 25 kg",
        warn: "🚨 Sicherheit: In Kunststoffbeutel einpacken & Pole abkleben!"
      },
      starter: {
        title: "Starterbatterien",
        art: "Art.Nr. 4100",
        css: "starter",
        icon: containerIcons.tub_yellow,
        containerName: "Säurefeste Kunststoffwanne",
        info: "• Bleiakkumulatoren mit Säurefüllung<br>• Auto-, Moped-, Traktor- & LKW-Batterien",
        warn: "⚖️ Sicherheit: Säurefest lagern, + Pole in der obersten Reihe abkleben."
      }
    };

    const video = document.getElementById('webcam');
    const actionBtn = document.getElementById('action-btn');
    const btnIcon = document.getElementById('btn-icon');
    const btnText = document.getElementById('btn-text');
    const loading = document.getElementById('loading');
    const damagedChk = document.getElementById('damaged-chk');
    
    const result = document.getElementById('result');
    const artNr = document.getElementById('art-nr');
    const targetTitle = document.getElementById('target-title');
    const containerSvgSlot = document.getElementById('container-svg-slot');
    const containerDesc = document.getElementById('container-desc');
    const targetInfo = document.getElementById('target-info');
    const targetWarn = document.getElementById('target-warn');

    let model = null;
    let isScanMode = true; // Status für Button-Toggle

    async function setupCamera() {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
      video.srcObject = stream;
      return new Promise(res => video.onloadedmetadata = () => res());
    }

    async function init() {
      try {
        await setupCamera();
        model = await mobilenet.load();
        loading.style.display = 'none';
        actionBtn.disabled = false;
      } catch(e) {
        loading.innerText = "Kamera-Zugriff erforderlich!";
      }
    }

    // Button Click Handler (Scan vs. Reset)
    actionBtn.addEventListener('click', async () => {
      if (isScanMode) {
        // --- SCAN AUSFÜHREN ---
        actionBtn.disabled = true;
        btnText.innerText = "Analysiere...";
        
        const predictions = await model.classify(video);
        
        if (predictions.length) {
          const top = predictions[0].className.toLowerCase();
          let rule = aszRules.geraete;

          if (damagedChk.checked) {
            rule = aszRules.li_beschaedigt;
          } else if (top.includes('car battery') || top.includes('accumulator')) {
            rule = aszRules.starter;
          } else if (top.includes('power bank') || top.includes('cellular phone') || top.includes('ipod') || top.includes('laptop')) {
            rule = aszRules.li_unbeschaedigt;
          }

          // UI mit Ergebnis füllen
          result.className = `card active ${rule.css}`;
          artNr.innerText = rule.art;
          targetTitle.innerText = rule.title;
          containerSvgSlot.innerHTML = rule.icon;
          containerDesc.innerText = rule.containerName;
          targetInfo.innerHTML = rule.info;
          targetWarn.innerHTML = rule.warn;

          // Button auf "Neuer Scan" umschalten
          isScanMode = false;
          actionBtn.className = "btn-action btn-reset-mode";
          btnIcon.innerText = "🔄";
          btnText.innerText = "Neuer Scan";
          actionBtn.disabled = false;
        }
      } else {
        // --- NEUER SCAN (RESET) ---
        result.className = "card"; // Karte ausblenden
        damagedChk.checked = false; // Checkbox zurücksetzen
        
        // Button zurück auf "Scan ausführen" schalten
        isScanMode = true;
        actionBtn.className = "btn-action btn-scan-mode";
        btnIcon.innerText = "📷";
        btnText.innerText = "Scan ausführen";
      }
    });

    init();
  </script>
</body>
</html>

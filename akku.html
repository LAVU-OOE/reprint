<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASZ Batterie-Sortierhilfe</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
    body { background: #181818; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 15px; }
    h1 { color: #8bc34a; font-size: 1.3rem; margin-bottom: 4px; text-align: center; }
    p.sub { font-size: 0.8rem; color: #aaa; margin-bottom: 12px; text-align: center; }
    
    .cam-box { position: relative; width: 100%; max-width: 440px; aspect-ratio: 4/3; background: #000; border-radius: 10px; overflow: hidden; }
    video { width: 100%; height: 100%; object-fit: cover; }
    
    .options-box { width: 100%; max-width: 440px; margin-top: 10px; background: #262626; padding: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
    .options-box label { font-size: 0.85rem; color: #ff9800; font-weight: bold; }

    .btn-scan { width: 100%; max-width: 440px; margin-top: 10px; padding: 12px; border: none; border-radius: 8px; background: #8bc34a; color: #000; font-size: 1rem; font-weight: bold; cursor: pointer; }
    .btn-scan:disabled { background: #444; color: #888; }

    .card { width: 100%; max-width: 440px; margin-top: 12px; padding: 14px; border-radius: 10px; background: #222; border-left: 6px solid #888; display: none; }
    .card.active { display: block; }
    .art-nr { font-size: 0.75rem; font-weight: bold; padding: 2px 6px; border-radius: 4px; background: rgba(255,255,255,0.2); float: right; }
    
    .title { font-size: 1.1rem; font-weight: bold; margin-bottom: 8px; }
    .info { font-size: 0.85rem; line-height: 1.4; color: #ddd; }
    .warn { font-size: 0.8rem; margin-top: 8px; padding: 6px; background: rgba(255,0,0,0.15); border-radius: 4px; color: #ff8a80; }

    /* ASZ Farbcodes */
    .geraete { border-color: #4caf50; } .geraete .title { color: #81c784; }
    .li-ok { border-color: #2196f3; } .li-ok .title { color: #64b5f6; }
    .li-dmg { border-color: #f44336; } .li-dmg .title { color: #e57373; }
    .starter { border-color: #ff9800; } .starter .title { color: #ffb74d; }
    .none { border-color: #9e9e9e; }
    
    #loading { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; font-size: 0.9rem; }
  </style>
</head>
<body>

  <h1>ASZ Batterie-Sortierer</h1>
  <p class="sub">Zuordnung nach LAVU OÖ Richtlinien</p>

  <div class="cam-box">
    <video id="webcam" autoplay playsinline muted></video>
    <div id="loading">Lade Erkennung...</div>
  </div>

  <div class="options-box">
    <label for="damaged-chk">⚠️ Batterie beschädigt / aufgebläht?</label>
    <input type="checkbox" id="damaged-chk" style="width: 18px; height: 18px;">
  </div>

  <button class="btn-scan" id="scan-btn" disabled>Scan ausführen</button>

  <div id="result" class="card">
    <span id="art-nr" class="art-nr"></span>
    <div id="target-title" class="title"></div>
    <div id="target-info" class="info"></div>
    <div id="target-warn" class="warn"></div>
  </div>

  <script>
    const video = document.getElementById('webcam');
    const scanBtn = document.getElementById('scan-btn');
    const loading = document.getElementById('loading');
    const damagedChk = document.getElementById('damaged-chk');
    
    const result = document.getElementById('result');
    const artNr = document.getElementById('art-nr');
    const targetTitle = document.getElementById('target-title');
    const targetInfo = document.getElementById('target-info');
    const targetWarn = document.getElementById('target-warn');

    let model = null;

    const aszRules = {
      geraete: {
        title: "Gerätebatterien",
        art: "Art.Nr. 4110",
        css: "geraete",
        info: "• Konsumbatterien (Alkali, Zink-Kohle)<br>• NiCd / NiMH Werkzeugakkus<br>• Knopfzellen & Weidezaunbatterien",
        warn: "💡 Hinweis: Kontaktfläche/Pole bei Knopfzellen mit Klebeband isolieren."
      },
      li_unbeschaedigt: {
        title: "Lithium-Batterien unbeschädigt",
        art: "Art.Nr. 4112",
        css: "li-ok",
        info: "• Intakte Li-Ion Akkus bis 5 kg<br>• Entnehmbare Akkus aus Handys, Laptops, Werkzeugen & Gartengeräten",
        warn: "🔒 Sicherheit: Pole und freistehende Drähte zwingend abkleben!"
      },
      li_beschaedigt: {
        title: "Lithium-Batterien beschädigt",
        art: "Art.Nr. 4111",
        css: "li-dmg",
        info: "• Verformte, erhitzte oder beschädigte LiPo/Li-Ion Akkus<br>• Akkus aus E-Bikes / E-Scootern bis 25 kg",
        warn: "🚨 Sicherheit: In Kunststoffbeutel einpacken & Pole abkleben!"
      },
      starter: {
        title: "Starterbatterien",
        art: "Art.Nr. 4100",
        css: "starter",
        info: "• Bleiakkumulatoren mit Säurefüllung<br>• Auto-, Moped-, Traktor- & LKW-Batterien",
        warn: "⚖️ Sicherheit: Säurefest lagern, + Pole in der obersten Reihe abkleben."
      },
      keine_annahme: {
        title: "Keine Annahme im ASZ!",
        art: "Rückgabe Handel",
        css: "none",
        info: "• Industrie-Lithium-Akkus (PV-Speicher, E-Boote)<br>• Fest eingebaute E-Roller/E-Moped Akkus",
        warn: "⛔ Bitte direkt an den Fahrzeughandel / Hersteller zurückgeben."
      }
    };

    async function setupCamera() {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
      video.srcObject = stream;
      return new Promise(res => video.onloadedmetadata = () => res());
    }

    async function init() {
      await setupCamera();
      model = await mobilenet.load();
      loading.style.display = 'none';
      scanBtn.disabled = false;
    }

    scanBtn.addEventListener('click', async () => {
      scanBtn.disabled = true;
      const predictions = await model.classify(video);
      scanBtn.disabled = false;

      if (!predictions.length) return;
      const top = predictions[0].className.toLowerCase();
      const isDamaged = damagedChk.checked;

      let rule = aszRules.geraete;

      if (isDamaged) {
        rule = aszRules.li_beschaedigt;
      } else if (top.includes('car battery') || top.includes('accumulator')) {
        rule = aszRules.starter;
      } else if (top.includes('power bank') || top.includes('cellular phone') || top.includes('ipod') || top.includes('laptop')) {
        rule = aszRules.li_unbeschaedigt;
      }

      result.className = `card active ${rule.css}`;
      artNr.innerText = rule.art;
      targetTitle.innerText = rule.title;
      targetInfo.innerHTML = rule.info;
      targetWarn.innerHTML = rule.warn;
    });

    init();
  </script>
</body>
</html>

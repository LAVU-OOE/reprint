<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>A4 Dynamic Sheet Viewer</title>
  <style>
    @page { size: A4 portrait; margin: 0; }
    * { box-sizing: border-box; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    body {
      margin: 0; padding: 20px 0; background-color: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; justify-content: center; align-items: flex-start; min-height: 100vh;
    }
    .a4-page {
      width: 210mm; height: 297mm; background: white;
      position: relative; page-break-after: always;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5); border-radius: 2px;
    }
    .calibration-header {
      position: absolute; top: 1mm; left: 5mm; right: 5mm; height: 8mm;
      border: 1px solid #dc2626; background-color: #fef2f2;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 4mm; font-size: 6pt; color: #991b1b; z-index: 100;
    }
    .calibration-box {
      width: 50mm; height: 4mm; border: 1px solid #991b1b; background: #ffffff;
      display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 5.5pt;
    }
    .label { position: absolute; border: 0.5pt dashed #9ca3af; background-color: #ffffff; overflow: hidden; }
    .label.round { border-radius: 50%; }
    .label-content {
      position: absolute; top: 1.5mm; bottom: 1.5mm; left: 1.5mm; right: 1.5mm;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      text-align: center; border: 0.5pt dotted #e5e7eb; background-color: #fafafa;
    }
    .label-sku { font-weight: bold; font-size: 7.5pt; color: #111827; }
    .label-dim { font-size: 6pt; color: #6b7280; }

    @media print {
      body { background: none; padding: 0; }
      .a4-page { margin: 0; box-shadow: none; }
    }
  </style>
</head>
<body>

<div id="pageContainer"></div>

<script>
  async function renderRequestedSheet() {
    // Read SKU from query string: sheet.html?sku=4270
    const params = new URLSearchParams(window.location.search);
    const targetSKU = params.get('sku') || '4473';

    const res = await fetch('herma_templates.json');
    const data = await res.json();
    const config = data.templates.find(t => t.sku === targetSKU);

    if (!config) {
      document.body.innerHTML = `<h2 style="color:white;">SKU "${targetSKU}" not found</h2>`;
      return;
    }

    // Dynamic style creation
    const styleTag = document.createElement('style');
    styleTag.textContent = `
      .sheet-${config.sku} {
        --top: ${config.top_margin_mm}mm;
        --left: ${config.left_margin_mm}mm;
        --w: ${config.width_mm}mm;
        --h: ${config.height_mm}mm;
        --gx: ${config.gap_x_mm}mm;
        --gy: ${config.gap_y_mm}mm;
      }
    `;
    document.head.appendChild(styleTag);

    // Build Sheet Element
    const pageDiv = document.createElement('div');
    pageDiv.className = `a4-page sheet-${config.sku}`;
    pageDiv.innerHTML = `
      <div class="calibration-header">
        <span><strong>PRINT RULE:</strong> Scale must be "100%" or "Actual Size".</span>
        <div class="calibration-box">MUST MEASURE 50mm</div>
      </div>
    `;

    for (let r = 0; r < config.rows; r++) {
      for (let c = 0; c < config.cols; c++) {
        const label = document.createElement('div');
        label.className = `label ${config.round ? 'round' : ''}`;
        label.style.left = `calc(var(--left) + ${c} * (var(--w) + var(--gx)))`;
        label.style.top = `calc(var(--top) + ${r} * (var(--h) + var(--gy)))`;
        label.style.width = `var(--w)`;
        label.style.height = `var(--h)`;
        label.innerHTML = `
          <div class="label-content">
            <div class="label-sku">${config.sku}</div>
            <div class="label-dim">${config.width_mm}x${config.height_mm}mm</div>
          </div>
        `;
        pageDiv.appendChild(label);
      }
    }

    document.getElementById('pageContainer').appendChild(pageDiv);
  }

  renderRequestedSheet();
</script>
</body>
</html>

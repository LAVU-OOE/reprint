<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <base href="/reprint/">
    <title>Upload JSON to Cloudflare</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            max-width: 700px;
            margin: 50px auto;
            padding: 30px;
            background: #f5f7fa;
            color: #1a1a2e;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            padding: 35px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }
        
        h2 {
            margin-bottom: 25px;
            color: #1a1a2e;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        h2 .badge {
            font-size: 14px;
            background: #4CAF50;
            color: white;
            padding: 2px 12px;
            border-radius: 20px;
            font-weight: 400;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #2d3748;
            font-size: 14px;
        }
        
        input[type="password"],
        input[type="file"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s;
            background: white;
        }
        
        input[type="password"]:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
        }
        
        input[type="file"] {
            padding: 10px 12px;
            cursor: pointer;
        }
        
        .file-info {
            margin-top: 8px;
            font-size: 13px;
            color: #718096;
        }
        
        .btn-upload {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin-top: 10px;
        }
        
        .btn-upload:hover {
            background: #43a047;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
        }
        
        .btn-upload:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .result-area {
            margin-top: 25px;
            padding: 16px;
            border-radius: 8px;
            background: #f7fafc;
            min-height: 80px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            white-space: pre-wrap;
            word-break: break-word;
            border: 1px solid #e2e8f0;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .result-area.success {
            background: #f0fff4;
            border-color: #48bb78;
            color: #22543d;
        }
        
        .result-area.error {
            background: #fff5f5;
            border-color: #fc8181;
            color: #742a2a;
        }
        
        .debug-area {
            margin-top: 12px;
            padding: 10px 14px;
            border-radius: 6px;
            background: #2d3748;
            color: #a0aec0;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 150px;
            overflow-y: auto;
            display: none;
        }
        
        .debug-area.visible {
            display: block;
        }
        
        .stats {
            display: none;
            gap: 15px;
            margin-top: 15px;
            padding: 12px 16px;
            background: #f7fafc;
            border-radius: 8px;
            font-size: 13px;
            color: #4a5568;
        }
        
        .stats span {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .stats .count {
            font-weight: 600;
            color: #2d3748;
        }
        
        .btn-debug {
            background: #edf2f7;
            border: 1px solid #e2e8f0;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            color: #4a5568;
            margin-top: 8px;
        }
        
        .btn-debug:hover {
            background: #e2e8f0;
        }
        
        .url-display {
            margin-top: 15px;
            padding: 10px 14px;
            background: #edf2f7;
            border-radius: 6px;
            font-size: 13px;
            color: #4a5568;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .url-display code {
            background: white;
            padding: 4px 10px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #2d3748;
            word-break: break-all;
        }
        
        .clear-btn {
            background: #fc8181;
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .clear-btn:hover {
            background: #f56565;
        }
        
        .password-toggle {
            position: relative;
        }
        
        .password-toggle input {
            padding-right: 45px;
        }
        
        .toggle-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #718096;
            font-size: 18px;
            padding: 4px;
        }
        
        .toggle-btn:hover {
            color: #2d3748;
        }
        
        .endpoint-selector {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 5px;
        }
        
        .endpoint-selector label {
            font-size: 13px;
            font-weight: 600;
            color: #2d3748;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 10px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            transition: all 0.2s;
            margin-bottom: 0;
        }
        
        .endpoint-selector label:hover {
            border-color: #4CAF50;
            background: #f0fff4;
        }
        
        .endpoint-selector input[type="radio"] {
            width: 16px;
            height: 16px;
            accent-color: #4CAF50;
            cursor: pointer;
            flex-shrink: 0;
        }
        
        .endpoint-selector label.selected {
            border-color: #4CAF50;
            background: #f0fff4;
        }
        
        .shortcuts-info {
            margin-top: 15px;
            padding: 10px 14px;
            background: #fffbeb;
            border: 1px solid #fcd34d;
            border-radius: 6px;
            font-size: 12px;
            color: #78350f;
        }
        
        .shortcuts-info code {
            background: #fef3c7;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: 600;
        }
        
        @media (max-width: 600px) {
            body {
                padding: 15px;
                margin: 20px auto;
            }
            .container {
                padding: 20px;
            }
            .endpoint-selector {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>
            📤 Upload JSON to Cloudflare
            <span class="badge">Secure</span>
        </h2>

        <!-- Endpoint Selection -->
        <div class="form-group">
            <label>🎯 Select Endpoint</label>
            <div class="endpoint-selector">
                <label id="labelSortiment" class="selected">
                    <input type="radio" name="endpoint" value="sortiment" checked>
                    📦 Sortiment
                </label>
                <label id="labelLocations">
                    <input type="radio" name="endpoint" value="locations">
                    📍 Locations
                </label>
                <label id="labelPrintLayout">
                    <input type="radio" name="endpoint" value="printLayout">
                    🖨️ Print Layout
                </label>
            </div>
        </div>

        <div class="url-display">
            <span>🔗 Endpoint:</span>
            <code id="endpointDisplay">https://sortiment-api.lavu-ooe.workers.dev/</code>
        </div>

        <!-- Password Input -->
        <div class="form-group">
            <label for="passwordInput">🔑 Admin Password</label>
            <div class="password-toggle">
                <input type="password" id="passwordInput" placeholder="Enter your admin password" autocomplete="off">
                <button class="toggle-btn" id="togglePassword" type="button" aria-label="Toggle password visibility">
                    👁️
                </button>
            </div>
            <div class="file-info">Your password is never stored or logged.</div>
        </div>

        <!-- File Input -->
        <div class="form-group">
            <label for="fileInput">📄 JSON File</label>
            <input type="file" id="fileInput" accept=".json">
            <div class="file-info" id="fileInfo">Select a valid JSON file with your data array.</div>
        </div>

        <!-- Upload Button -->
        <button class="btn-upload" id="uploadBtn">📤 Upload to Cloudflare</button>

        <!-- Result Display -->
        <div class="result-area" id="result">Ready to upload...</div>

        <!-- Debug Area -->
        <div class="debug-area visible" id="debugArea"></div>
        
        <button class="btn-debug" id="debugToggle">🔧 Hide Debug</button>

        <!-- Stats -->
        <div class="stats" id="stats">
            <span>📊 Items: <span class="count" id="itemCount">0</span></span>
            <span>📦 File size: <span class="count" id="fileSize">0 bytes</span></span>
        </div>

        <!-- Clear Password Button -->
        <div style="margin-top: 15px; text-align: right;">
            <button class="clear-btn" onclick="clearPassword()">🧹 Clear Password</button>
        </div>

        <!-- Shortcuts -->
        <div class="shortcuts-info">
            ⌨️ <code>Ctrl+Enter</code> to upload &nbsp;|&nbsp; <code>Esc</code> to clear password
        </div>
    </div>

    <script src="assets/js/upload.js"></script> <!-- Achte auf den Pfad, je nach Struktur -->
</body>
</html>

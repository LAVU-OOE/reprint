<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1a4b60" />
    <title>LAVU OÖ - Label Studio</title>
    <base href="/label-studio/">
    <link rel="stylesheet" href="styles.css" />
    <link class="icon" type="image/svg+xml" href="assets/icons/favicon.svg" />
    <link rel="manifest" href="manifest.json" />
    <link rel="canonical" href="https://lavu-ooe.github.io/label-studio/">
</head>
<body>
    <input type=\"hidden\" id=\"i5\" value=\"\" />
    <input type=\"hidden\" id=\"i6\" value=\"\" />
    <input type=\"hidden\" id=\"i7\" value=\"\" />
    <div class=\"crd\">
        <div class=\"hdr\">
            <div class=\"hdr-l\">
                <img src=\"assets/icons/logo.png\" alt=\"LAVU Logo\" class=\"lg\" onerror=\"this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'40\\' height=\\'40\\' viewBox=\\'0 0 24 24\\' fill=\\'none\\' stroke=\\'%231a4b60\\' stroke-width=\\'2.5\\'><rect x=\\'3\\' y=\\'3\\' width=\\'18\\' height=\\'18\\' rx=\\'2\\'/><path d=\\'M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4\\'/></svg>'\">
                <div>
                    <h2>Label Studio</h2>
                    <p>LAVU Oberösterreich</p>
                </div>
            </div>
            <button class=\"btn-circle\" id=\"btn-options\" title=\"Optionen\">
                <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\">
                    <circle cx=\"12\" cy=\"12\" r=\"3\"/>
                    <path d=\"M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z\"/>
                </svg>
            </button>
        </div>

        <div class=\"sec-title\">1. Standort wählen</div>
        <div class=\"grid-2\">
            <div class=\"form-group\">
                <label for=\"s1\">Vorauswahl</label>
                <select id=\"s1\"><option value=\"\" disabled selected>Zentren werden geladen...</option></select>
            </div>
            <div class=\"form-group\">
                <label for=\"i1\">Manueller Text / Korrektur</label>
                <input type=\"text\" id=\"i1\" placeholder=\"z.B. ASZ Musterort\" />
            </div>
        </div>

        <div class=\"sec-title\">2. Müllart wählen & Anzahl</div>
        <div class=\"grid-2\">
            <div class=\"form-group\">
                <label for=\"s2\">Bezeichnung</label>
                <select id=\"s2\"><option value=\"\" disabled selected>Sortiment wird geladen...</option></select>
            </div>
            <div class=\"form-group\">
                <label for=\"i2\">Anzahl der Etiketten (max. 4 pro Seite)</label>
                <input type=\"number\" id=\"i2\" value=\"1\" min=\"1\" max=\"4\" />
            </div>
        </div>

        <div class=\"preview-box-container\">
            <div class=\"preview-badge\">Live-Vorschau (1 Etikett)</div>
            <div class=\"lb\" id=\"t1\"></div>
        </div>

        <button class=\"btn-print\" id=\"btn-print-now\">
            <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" style=\"margin-right: 8px;\">
                <polyline points=\"6 9 6 2 18 2 18 9\"/>
                <path d=\"M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2\"/>
                <rect x=\"6\" y=\"14\" width=\"12\" height=\"8\"/>
            </svg>
            Jetzt drucken (A4)
        </button>
    </div>

    <div class=\"ftr\">
        &copy; 2026 LAVU Oberösterreich. Alle Rechte vorbehalten. Interner Gebrauch.
    </div>

    <div class=\"modal\" id=\"m1\" style=\"display: none;\">
        <div class=\"modal-content\">
            <div class=\"modal-header\">
                <h3>Sortiment-Verwaltung</h3>
                <button class=\"close-btn\" id=\"modal1CloseBtn\">&times;</button>
            </div>
            <div class=\"modal-body\">
                <div class=\"form-group\">
                    <label for=\"i4\">Zentrale Sortiment-URL (JSON-Endpunkt)</label>
                    <div style=\"display: flex; gap: 10px;\">
                        <input type=\"text\" id=\"i4\" style=\"flex: 1;\" />
                        <button class=\"btn-print\" id=\"btn-update\" style=\"margin-top:0; padding: 0 15px; width:auto; font-size:0.9rem;\">Aktualisieren</button>
                    </div>
                </div>
                <div class=\"sec-title\" style=\"margin-top:20px; font-size:1rem;\">Aktuelle Einträge</div>
                <div id=\"c4\" style=\"max-height: 200px; overflow-y: auto; border: 1px solid #eef2f5; border-radius: 8px; padding: 10px;\"></div>
            </div>
            <div class=\"modal-footer\">
                <button class=\"btn-print\" id=\"btn-done\" style=\"margin-top:0; width:auto; padding: 10px 25px;\">Fertig</button>
            </div>
        </div>
    </div>

    <div id=\"hpc\">
        <div class=\"pc\" id=\"d5\"></div>
    </div>
    <script src=\"script.js\"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <title>LAVU OÖ - Label Studio v9</title>
    <base href="/label-studio/">
    <link rel="stylesheet" href="assets/css/styles.css" />
    <link class="icon" type="image/svg+xml" href="assets/icons/favicon.svg" />
    <link rel="manifest" href="manifest.json" />
    <link rel="canonical" href="https://lavu-ooe.github.io/label-studio/">
</head>
<body>

    <!-- MAIN CARD -->
    <div class="crd">

        <!-- HEADER -->
        <header class="hdr">
            <div class="hdr-l">
                <img src="assets/icons/logo.png" alt="LAVU Logo" class="lg"
                onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'40\' height=\'40\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'%233b82f6\' stroke-width=\'2\'><circle cx=\'12\' cy=\'12\' r=\'10\'/><path d=\'M8 14s1.5 2 4 2 4-2 4-2\'/><line x1=\'9\' y1=\'9\' x2=\'9.01\' y2=\'9\'/><line x1=\'15\' y1=\'9\' x2=\'15.01\' y2=\'9\'/></svg>'">
                <div>
                    <div class="hdr-ttl">LAVU OÖ</div>
                    <div class="hdr-sub" id="txt-studio-v9">Etiketten-Studio v9</div>
                </div>
            </div>
            <div class="hdr-r">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                    <circle cx="12" cy="10" r="3" />
                </svg>
                <select id="s1" class="sel-hdr">
                    <option value="" disabled selected>Loading locations…</option>
                </select>
                <button id="langToggleBtn" class="btn-lang-toggle" aria-label="Toggle language">EN</button>
            </div>
        </header>

        <!-- MAIN BODY -->
        <div class="db">

            <!-- PREVIEW SIDE -->
            <div class="ps-wrapper">
                <div class="ps-ttl" id="fmt-overlay">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/></svg>
                    Format wird geladen…
                </div>
                <div class="ps" id="layout-title-attr" title="Klicken für vollständige A4-Großansicht">
                    <div class="tw">
                        <div class="sc" id="previewScaleContainer">
                            <div class="psh" id="t1"></div>
                        </div>
                        <div class="to" id="txt-print-layout">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 2px;">
                                <path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" />
                                <rect x="6" y="14" width="12" height="8" />
                            </svg>
                            Druck-Layout
                        </div>
                    </div>
                </div>
            </div>

            <!-- INPUT PANEL -->
            <div class="ip">
                <div class="fps">
                    <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 12px; width: 100%;">
                        <div>
                            <span id="txt-art-nr" style="font-size:0.7rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; display:block; margin-bottom:4px;">Art.Nr.</span>
                            <select id="s2_art"></select>
                        </div>
                        <div>
                            <span id="txt-bezeichnung" style="font-size:0.7rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; display:block; margin-bottom:4px;">Bezeichnung</span>
                            <select id="s2_name"></select>
                        </div>
                    </div>
                </div>

                <!-- sample label preview -->
                <div class="sb">
                    <div class="lbt" id="d0">-</div>
                    <div class="lbm">
                        <div class="lba" id="d2">-</div>
                        <div class="lbs" id="d3">-</div>
                    </div>
                    <div class="lbt bbb-fake-fix" style="border-bottom:none; font-size:1px; height:1px; line-height:1px;"></div>
                    <div class="lbb" id="d1">-</div>
                    <div style="font-size:0.7rem; color:var(--text-muted); margin-top:6px; border-top:1px dashed var(--border); padding-top:4px; text-transform:uppercase; font-weight:600; letter-spacing:0.03em; visibility:hidden;" id="d4">-</div>
                </div>

                <!-- action buttons -->
                <div class="ab">
                    <button class="bp" id="btn-print-now">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <polyline points="6 9 6 2 18 2 18 9" />
                            <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" />
                            <rect x="6" y="14" width="12" height="8" />
                        </svg>
                        Jetzt Drucken
                    </button>
                    <button class="bs" id="btn-options">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <circle cx="12" cy="12" r="3" />
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
                        </svg>
                        Optionen
                    </button>
                </div>
            </div>
        </div>

        <!-- FOOTER -->
        <div class="ftr">
            Built with <span style="color:#ef4444;">&hearts;</span> by Karli
            <span style="color:var(--border);">|</span>
            <a href="https://github.com/7pub" target="_blank">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22" />
                </svg>
                GitHub
            </a>
        </div>
    </div>

    <!-- ===== MODAL 1 – Settings ===== -->
    <div id="m1" class="mb">
        <div class="mc">
            <div class="mh">
                <span id="txt-modal1-title">Druck- & Standorteinstellungen</span>
                <button class="bx" id="modal1CloseBtn" aria-label="Close modal">&times;</button>
            </div>

            <!-- hidden fields used by JS -->
            <div class="fv" style="display:none;">
                <label for="locationSelect" id="lbl-location">Standort</label>
                <select id="locationSelect"></select>
            </div>
            <div class="fv" style="display:none;">
                <label for="labelFormatSelect" id="lbl-format">Format</label>
                <select id="labelFormatSelect"></select>
            </div>
            <div class="fg" style="display:none;">
                <div class="fv">
                    <label for="i2" id="lblCount">Anzahl Etiketten:</label>
                    <input type="number" id="i2" value="21" min="1" />
                </div>
                <div class="fv">
                    <label for="i3" id="lblStartPos">Start-Position:</label>
                    <input type="number" id="i3" value="1" min="1" />
                </div>
            </div>

            <!-- tabs -->
            <div class="ms">
                <div id="t2" class="mt a">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <line x1="8" y1="6" x2="21" y2="6" />
                        <line x1="8" y1="12" x2="21" y2="12" />
                        <line x1="8" y1="18" x2="21" y2="18" />
                        <line x1="3" y1="6" x2="3.01" y2="6" />
                        <line x1="3" y1="12" x2="3.01" y2="12" />
                        <line x1="3" y1="18" x2="3.01" y2="18" />
                    </svg>
                    <span id="txt-tab-select">LAVU Service-Worker</span>
                </div>
                <div id="t3" class="mt">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="12" y1="8" x2="12" y2="16" />
                        <line x1="8" y1="12" x2="16" y2="12" />
                    </svg>
                    <span id="txt-tab-manage">Datenbank verwalten</span>
                </div>
            </div>

            <!-- tab: select -->
            <div id="s3" class="fs a">
                <div class="fv">
                    <label for="i4" id="lbl-url">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />
                            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
                        </svg>
                        Sortiment-Worker:
                    </label>
                    <div style="display:flex; gap:8px;">
                        <input type="text" id="i4" placeholder="https://…" style="flex:1;" />
                        <button class="bc bsd" style="padding:0.55rem 1rem;" id="btn-update">Aktualisieren</button>
                    </div>
                    <span id="n1" class="n1" style="font-size:0.75rem; font-weight:500; margin-top:4px; display:block;"></span>
                </div>
                <div class="fv" style="border-top:1px dashed var(--border); padding-top:0.75rem;">
                    <label for="i8" id="lbl-locations-url">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                            <circle cx="12" cy="10" r="3" />
                        </svg>
                        Locations-Worker:
                    </label>
                    <div style="display:flex; gap:8px;">
                        <input type="text" id="i8" placeholder="https://…" style="flex:1;" />
                        <button class="bc bsd" style="padding:0.55rem 1rem;" id="btn-update-locations">Aktualisieren</button>
                    </div>
                    <span id="n2" class="n2" style="font-size:0.75rem; font-weight:500; margin-top:4px; display:block;"></span>
                </div>
            </div>

            <!-- tab: manage -->
            <div id="s4" class="fs">
                <div class="fg" style="margin-bottom:0.75rem;">
                    <input type="hidden" id="e1" value="" />
                    <div class="fv">
                        <label for="c1">Art.Nr.:</label>
                        <input type="text" id="c1" placeholder="z.B. 4040" />
                    </div>
                    <div class="fv">
                        <label for="c2" id="lbl-db-suffix">Gebinde / Suffix:</label>
                        <input type="text" id="c2" placeholder="z.B. QR-Box" />
                    </div>
                    <div class="fv fw">
                        <label for="c3" id="lbl-db-bez">Bezeichnung:</label>
                        <input type="text" id="c3" placeholder="z.B. Elektro-Kleingeräte" />
                    </div>
                </div>
                <div style="display:flex; gap:8px; margin-bottom:0.75rem; flex-wrap:wrap;">
                    <button id="b1" class="bc bsd" style="display:none; background:#e67e22;">💾 Ändern</button>
                    <button class="bc bsd" style="background:var(--success); flex:1;" id="btn-add-new">➕ Neu hinzufügen</button>
                    <button class="bc bcn" id="btn-cancel">Abbrechen</button>
                </div>
                <div style="margin-bottom:0.75rem;">
                    <button class="bc" style="background:#2c3e50; color:#fff; width:100%; display:flex; align-items:center; justify-content:center; gap:8px; padding:0.6rem;" id="btn-download-json">
                        📥 Aktuelle Datenbank als JSON herunterladen
                    </button>
                </div>
                <label id="lbl-current-entries" style="font-size:0.8rem; font-weight:500; color:var(--text-muted); display:block; margin-bottom:4px;">Aktuelle Einträge im lokalen Workspace:</label>
                <div id="c4"></div>
            </div>

            <div class="mf">
                <button id="b2" class="bsd" style="display:none;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
                        <polyline points="17 21 17 13 7 13 7 21" />
                        <polyline points="7 3 7 8 15 8" />
                    </svg>
                    <span id="btn-save-default">Standard sichern</span>
                </button>
                <button class="bcn" id="btn-done">Fertig</button>
            </div>
        </div>
    </div>

    <!-- ===== MODAL 2 – A4 Preview ===== -->
    <div id="m2" class="mb">
        <div class="mc mpc">
            <div class="mh">
                <span id="modalTitle">Interaktiver A4-Druckbogen</span>
                <select id="modalLabelFormatSelect" class="sel-modal-hdr"></select>
                <button class="bx" id="modal2CloseBtn" aria-label="Close modal">&times;</button>
            </div>
            <div class="mbs">
                <!-- Zoom Toggle -->
                <button id="zoomToggleBtn" class="zoom-toggle-btn" aria-label="Zoom ein-/ausblenden">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        <line x1="8" y1="11" x2="14" y2="11" />
                    </svg>
                </button>

                <div class="pc" id="p1">
                    <div class="psh" id="mdl"></div>
                </div>

                <!-- Zoom Container -->
                <div class="zoom-container" id="zoomContainer">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        <line x1="8" y1="11" x2="14" y2="11" />
                    </svg>
                    <div class="zoom-slider-wrapper">
                        <input type="range" id="zoomSlider" class="zoom-slider" min="50" max="300" value="100" />
                    </div>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="11" y1="8" x2="11" y2="14" />
                        <line x1="8" y1="11" x2="14" y2="11" />
                    </svg>
                    <div class="zoom-label">
                        <span id="zoomVal">100%</span>
                    </div>
                </div>
            </div>
            <div class="mf">
                <button class="bp" id="btn-modal-print">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <polyline points="6 9 6 2 18 2 18 9" />
                        <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" />
                        <rect x="6" y="14" width="12" height="8" />
                    </svg>
                    Drucken
                </button>
                <button class="bcn" id="btn-modal-close">Schließen</button>
            </div>
        </div>
    </div>

    <!-- ===== hidden print container ===== -->
    <div id="hpc">
        <div class="pc" id="d5"></div>
    </div>

    <!-- ===== PWA banner ===== -->
    <div class="pwb" id="pwaBanner">
        <div>
            <div>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M21 15v4a2 2 0 0 1-2-2v-4" />
                    <polyline points="7 10 12 15 17 10" />
                    <line x1="12" y1="15" x2="12" y2="3" />
                </svg>
            </div>
            <div>
                <div style="font-weight:bold; font-size:0.95rem;" id="txt-pwa-title">Als App installieren</div>
                <div style="font-size:0.8rem; color:var(--text-muted);" id="txt-pwa-sub">Schnellerer Zugriff &amp; Offline-Nutzung</div>
            </div>
        </div>
        <button id="b3">Installieren</button>
    </div>

    <script src="assets/js/script.js"></script>
</body>
</html>

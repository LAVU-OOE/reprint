<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload JSON to Cloudflare</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            max-width: 700px;
            margin: 50px auto;
            padding: 30px;
            background: #f5f7fa;
            color: #1a1a2e;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            padding: 35px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }
        
        h2 {
            margin-bottom: 25px;
            color: #1a1a2e;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        h2 .badge {
            font-size: 14px;
            background: #4CAF50;
            color: white;
            padding: 2px 12px;
            border-radius: 20px;
            font-weight: 400;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #2d3748;
            font-size: 14px;
        }
        
        select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s;
            background: white;
            cursor: pointer;
        }
        
        select:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
        }
        
        input[type="password"],
        input[type="file"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s;
            background: white;
        }
        
        input[type="password"]:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
        }
        
        input[type="file"] {
            padding: 10px 12px;
            cursor: pointer;
        }
        
        .file-info {
            margin-top: 8px;
            font-size: 13px;
            color: #718096;
        }
        
        .btn-upload {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin-top: 10px;
        }
        
        .btn-upload:hover {
            background: #43a047;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
        }
        
        .btn-upload:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .result-area {
            margin-top: 25px;
            padding: 16px;
            border-radius: 8px;
            background: #f7fafc;
            min-height: 80px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            white-space: pre-wrap;
            word-break: break-word;
            border: 1px solid #e2e8f0;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .result-area.success {
            background: #f0fff4;
            border-color: #48bb78;
            color: #22543d;
        }
        
        .result-area.error {
            background: #fff5f5;
            border-color: #fc8181;
            color: #742a2a;
        }
        
        .result-area.loading {
            background: #ebf8ff;
            border-color: #63b3ed;
            color: #2a4365;
        }
        
        .debug-area {
            margin-top: 12px;
            padding: 10px 14px;
            border-radius: 6px;
            background: #2d3748;
            color: #a0aec0;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 150px;
            overflow-y: auto;
            display: none;
        }
        
        .debug-area.visible {
            display: block;
        }
        
        .stats {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            padding: 12px 16px;
            background: #f7fafc;
            border-radius: 8px;
            font-size: 13px;
            color: #4a5568;
        }
        
        .stats span {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .stats .count {
            font-weight: 600;
            color: #2d3748;
        }
        
        .btn-debug {
            background: #edf2f7;
            border: 1px solid #e2e8f0;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            color: #4a5568;
            margin-top: 8px;
        }
        
        .btn-debug:hover {
            background: #e2e8f0;
        }
        
        .url-display {
            margin-top: 15px;
            padding: 10px 14px;
            background: #edf2f7;
            border-radius: 6px;
            font-size: 13px;
            color: #4a5568;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .url-display code {
            background: white;
            padding: 4px 10px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #2d3748;
            word-break: break-all;
        }
        
        .clear-btn {
            background: #fc8181;
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .clear-btn:hover {
            background: #f56565;
        }
        
        .password-toggle {
            position: relative;
        }
        
        .password-toggle input {
            padding-right: 45px;
        }
        
        .toggle-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #718096;
            font-size: 14px;
            padding: 4px;
        }
        
        .toggle-btn:hover {
            color: #2d3748;
        }
        
        .endpoint-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 5px;
        }
        
        .endpoint-selector label {
            font-size: 13px;
            font-weight: 600;
            color: #2d3748;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 10px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        .endpoint-selector label:hover {
            border-color: #4CAF50;
            background: #f0fff4;
        }
        
        .endpoint-selector input[type="radio"] {
            width: 16px;
            height: 16px;
            accent-color: #4CAF50;
            cursor: pointer;
            flex-shrink: 0;
        }
        
        .endpoint-selector label.selected {
            border-color: #4CAF50;
            background: #f0fff4;
        }
        
        @media (max-width: 600px) {
            body {
                padding: 15px;
                margin: 20px auto;
            }
            .container {
                padding: 20px;
            }
            .endpoint-selector {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>
            📤 Upload JSON to Cloudflare
            <span class="badge">Secure</span>
        </h2>

        <!-- Endpoint Selection -->
        <div class="form-group">
            <label>🎯 Select Endpoint</label>
            <div class="endpoint-selector">
                <label id="labelSortiment" class="selected">
                    <input type="radio" name="endpoint" value="sortiment" checked>
                    📦 Sortiment
                </label>
                <label id="labelLocations">
                    <input type="radio" name="endpoint" value="locations">
                    📍 Locations
                </label>
            </div>
        </div>

        <div class="url-display">
            <span>🔗 Endpoint:</span>
            <code id="endpointDisplay">https://sortiment-api.lavu-ooe.workers.dev/</code>
        </div>

        <!-- Password Input -->
        <div class="form-group">
            <label for="passwordInput">🔑 Admin Password</label>
            <div class="password-toggle">
                <input type="password" id="passwordInput" placeholder="Enter your admin password" autocomplete="off">
                <button class="toggle-btn" id="togglePassword" type="button" aria-label="Toggle password visibility">
                    👁️
                </button>
            </div>
            <div class="file-info">Your password is never stored or logged.</div>
        </div>

        <!-- File Input -->
        <div class="form-group">
            <label for="fileInput">📄 JSON File</label>
            <input type="file" id="fileInput" accept=".json">
            <div class="file-info" id="fileInfo">Select a valid JSON file with your data array.</div>
        </div>

        <!-- Upload Button -->
        <button class="btn-upload" id="uploadBtn" onclick="uploadFile()">
            📤 Upload to Cloudflare
        </button>

        <!-- Result Display -->
        <div class="result-area" id="result">Ready to upload...</div>

        <!-- Debug Area -->
        <div class="debug-area" id="debugArea"></div>
        
        <button class="btn-debug" id="debugToggle" onclick="toggleDebug()">🔧 Toggle Debug</button>

        <!-- Stats -->
        <div class="stats" id="stats" style="display:none;">
            <span>📊 Items: <span class="count" id="itemCount">0</span></span>
            <span>📦 File size: <span class="count" id="fileSize">0 bytes</span></span>
        </div>

        <!-- Clear Password Button -->
        <div style="margin-top: 15px; text-align: right;">
            <button class="clear-btn" onclick="clearPassword()">🧹 Clear Password</button>
        </div>
    </div>

    <script>
        // ===== CONFIGURATION =====
        const ENDPOINTS = {
            sortiment: 'https://sortiment-api.lavu-ooe.workers.dev/',
            locations: 'https://locations-api.lavu-ooe.workers.dev/'
        };
        
        const USERNAME = 'admin';
        let currentEndpoint = 'sortiment';
        
        // ===== DOM Elements =====
        const passwordInput = document.getElementById('passwordInput');
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const resultDiv = document.getElementById('result');
        const debugArea = document.getElementById('debugArea');
        const debugToggle = document.getElementById('debugToggle');
        const fileInfo = document.getElementById('fileInfo');
        const statsDiv = document.getElementById('stats');
        const itemCount = document.getElementById('itemCount');
        const fileSize = document.getElementById('fileSize');
        const toggleBtn = document.getElementById('togglePassword');
        const endpointDisplay = document.getElementById('endpointDisplay');
        const radioButtons = document.querySelectorAll('input[name="endpoint"]');
        const labelSortiment = document.getElementById('labelSortiment');
        const labelLocations = document.getElementById('labelLocations');
        
        let debugVisible = false;
        let passwordTimer;

        // ===== Helper Functions =====
        function setResult(message, type = '') {
            resultDiv.textContent = message;
            resultDiv.className = 'result-area';
            if (type) resultDiv.classList.add(type);
        }

        function setDebug(message) {
            debugArea.textContent = '🔍 Debug: ' + message;
            if (debugVisible) {
                debugArea.classList.add('visible');
            }
        }

        function toggleDebug() {
            debugVisible = !debugVisible;
            debugArea.classList.toggle('visible', debugVisible);
            debugToggle.textContent = debugVisible ? '🔧 Hide Debug' : '🔧 Toggle Debug';
        }

        function clearPassword() {
            passwordInput.value = '';
            clearTimeout(passwordTimer);
            setDebug('Password cleared');
        }

        function clearPasswordAfterDelay() {
            clearTimeout(passwordTimer);
            passwordTimer = setTimeout(() => {
                passwordInput.value = '';
                setDebug('Password auto-cleared (5 min timeout)');
            }, 300000);
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' bytes';
            if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1048576).toFixed(1) + ' MB';
        }

        function getApiUrl() {
            return ENDPOINTS[currentEndpoint];
        }

        function updateEndpointDisplay() {
            endpointDisplay.textContent = getApiUrl();
            // Update button text
            const endpointName = currentEndpoint === 'sortiment' ? 'Sortiment' : 'Locations';
            uploadBtn.innerHTML = `📤 Upload ${endpointName} to Cloudflare`;
            // Update label highlight
            labelSortiment.classList.toggle('selected', currentEndpoint === 'sortiment');
            labelLocations.classList.toggle('selected', currentEndpoint === 'locations');
            setDebug('Switched to ' + endpointName + ' endpoint');
        }

        // ===== Endpoint Selection =====
        radioButtons.forEach(radio => {
            radio.addEventListener('change', function() {
                if (this.checked) {
                    currentEndpoint = this.value;
                    updateEndpointDisplay();
                    // Reset result display
                    setResult('Ready to upload. Select a JSON file and enter your password.', '');
                    statsDiv.style.display = 'none';
                }
            });
        });

        // ===== File Input Handler =====
        fileInput.addEventListener('change', function() {
            const file = this.files[0];
            if (!file) {
                fileInfo.textContent = 'Select a valid JSON file with your data array.';
                statsDiv.style.display = 'none';
                return;
            }
            
            if (!file.name.endsWith('.json')) {
                fileInfo.textContent = '⚠️ Please select a .json file!';
                statsDiv.style.display = 'none';
                return;
            }
            
            fileInfo.textContent = `📎 Selected: ${file.name}`;
            
            statsDiv.style.display = 'flex';
            fileSize.textContent = formatFileSize(file.size);
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (Array.isArray(data)) {
                        itemCount.textContent = data.length;
                    } else {
                        itemCount.textContent = '? (not an array)';
                    }
                } catch {
                    itemCount.textContent = '⚠️ Invalid JSON';
                }
            };
            reader.readAsText(file);
        });

        // ===== Password Toggle =====
        toggleBtn.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.textContent = type === 'password' ? '👁️' : '🙈';
        });

        // ===== Password Auto-Clear Timer =====
        passwordInput.addEventListener('input', clearPasswordAfterDelay);

        // ===== Main Upload Function =====
        async function uploadFile() {
            const password = passwordInput.value.trim();
            const file = fileInput.files[0];
            const apiUrl = getApiUrl();
            const endpointName = currentEndpoint === 'sortiment' ? 'Sortiment' : 'Locations';
            
            if (!password) {
                setResult('❌ Please enter your admin password!', 'error');
                setDebug('No password provided');
                return;
            }
            
            if (!file) {
                setResult('❌ Please select a JSON file!', 'error');
                setDebug('No file selected');
                return;
            }
            
            if (!file.name.endsWith('.json')) {
                setResult('❌ Please select a .json file!', 'error');
                setDebug('Invalid file type: ' + file.name);
                return;
            }

            uploadBtn.disabled = true;
            uploadBtn.textContent = '⏳ Uploading...';
            setResult(`⏳ Reading and uploading ${endpointName} file...`, 'loading');
            setDebug(`Starting upload to ${endpointName} endpoint...`);

            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const jsonData = JSON.parse(e.target.result);
                    setDebug(`JSON parsed successfully, ${jsonData.length} items`);
                    
                    if (!Array.isArray(jsonData)) {
                        setResult('❌ Invalid JSON: Expected an array of objects!', 'error');
                        setDebug('JSON is not an array');
                        uploadBtn.disabled = false;
                        uploadBtn.textContent = `📤 Upload ${endpointName} to Cloudflare`;
                        return;
                    }

                    if (jsonData.length === 0) {
                        setResult('⚠️ Warning: Array is empty!', 'error');
                        setDebug('Empty array uploaded');
                    }

                    const authString = btoa(USERNAME + ':' + password);
                    setDebug('Auth header created (length: ' + authString.length + ')');

                    const response = await fetch(apiUrl, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Basic ' + authString
                        },
                        credentials: 'include',
                        body: JSON.stringify(jsonData)
                    });

                    const result = await response.json();
                    setDebug('Response status: ' + response.status + ' ' + response.statusText);

                    if (response.ok) {
                        setResult(`✅ ${endpointName} upload successful! ` + JSON.stringify(result, null, 2), 'success');
                        setDebug('Upload completed successfully');
                        clearPassword();
                        itemCount.textContent = jsonData.length;
                        statsDiv.style.display = 'flex';
                    } else {
                        setResult(`❌ Error (${response.status}): ` + JSON.stringify(result, null, 2), 'error');
                        setDebug('Upload failed with status ' + response.status);
                    }
                } catch (error) {
                    setResult('❌ Error: ' + error.message, 'error');
                    setDebug('Exception: ' + error.message + '\nStack: ' + error.stack);
                } finally {
                    uploadBtn.disabled = false;
                    uploadBtn.textContent = `📤 Upload ${endpointName} to Cloudflare`;
                }
            };

            reader.onerror = function() {
                setResult('❌ Error reading file!', 'error');
                setDebug('FileReader error');
                uploadBtn.disabled = false;
                uploadBtn.textContent = `📤 Upload ${endpointName} to Cloudflare`;
            };

            reader.readAsText(file);
        }

        // ===== Keyboard Shortcuts =====
        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                uploadFile();
            }
            if (e.key === 'Escape') {
                clearPassword();
                setDebug('Password cleared (Escape key)');
            }
        });

        // ===== Init =====
        setResult('Ready to upload. Select a JSON file and enter your password.', '');
        setDebug('Ready');
        updateEndpointDisplay();
        
        console.log('📤 Cloudflare JSON Uploader v2.0 (Sortiment & Locations)');
        console.log('🔗 Sortiment API:', ENDPOINTS.sortiment);
        console.log('🔗 Locations API:', ENDPOINTS.locations);
        console.log('⌨️  Shortcuts: Ctrl+Enter to upload, Escape to clear password');
    </script>
</body>
</html>
